<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealerHub Pro — Enterprise Management</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-bg">
            <div class="orb"></div>
            <div class="orb"></div>
            <div class="orb"></div>
        </div>
        <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
            <div class="w-full max-w-md">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 to-amber-600 mb-4 shadow-lg shadow-amber-500/20">
                        <i class="fas fa-bolt text-2xl text-gray-900"></i>
                    </div>
                    <h1 class="font-heading text-3xl font-bold text-fg">DealerHub Pro</h1>
                    <p class="text-muted mt-1 text-sm">Enterprise Dealer Management & Social Automation</p>
                </div>
                <div class="bg-card/80 backdrop-blur-xl border border-border rounded-2xl p-7">
                    <div class="mb-4">
                        <label class="block text-xs font-medium text-muted mb-1.5">Email Address</label>
                        <input id="loginEmail" type="email" class="input-field" placeholder="you@company.com">
                    </div>
                    <div class="mb-5">
                        <label class="block text-xs font-medium text-muted mb-1.5">Password</label>
                        <input id="loginPassword" type="password" class="input-field" placeholder="Enter your password">
                    </div>
                    <button onclick="handleLogin()" class="btn btn-primary w-full justify-center py-2.5 text-sm">
                        <i class="fas fa-arrow-right-to-bracket"></i> Sign In
                    </button>
                    <div id="loginError" class="mt-3 text-danger text-xs text-center hidden"></div>
                </div>
                <div class="mt-5 bg-card/40 border border-border rounded-xl p-4">
                    <p class="text-[10px] text-muted mb-2 font-semibold uppercase tracking-wider">Demo Credentials</p>
                    <div class="grid grid-cols-2 gap-2 text-[11px] text-dimmed">
                        <div><span class="text-accent">Admin:</span> admin@dealerhub.com</div>
                        <div><span class="text-accent">Pass:</span> admin123</div>
                        <div><span class="text-accent2">Dealer:</span> rajesh@dealer.com</div>
                        <div><span class="text-accent2">Pass:</span> dealer123</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- App Screen -->
    <div id="appScreen" class="hidden">
        <aside id="sidebar" class="sidebar">
            <div class="flex items-center gap-3 px-4 py-4 border-b border-border">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-bolt text-gray-900 text-xs"></i>
                </div>
                <span class="logo-text font-heading font-bold text-base text-fg">DealerHub</span>
            </div>
            <nav id="sidebarNav" class="py-3 flex-1 overflow-y-auto"></nav>
            <div id="sidebarUser" class="px-4 py-3 border-t border-border"></div>
        </aside>
        
        <div id="mainArea" class="main-area">
            <header class="sticky top-0 z-30 bg-bg/80 backdrop-blur-xl border-b border-border px-5 py-2.5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="text-muted hover:text-fg transition p-1.5">
                        <i class="fas fa-bars text-sm"></i>
                    </button>
                    <h2 id="pageTitle" class="font-heading font-semibold text-base text-fg"></h2>
                </div>
                <div class="flex items-center gap-3">
                    <div id="walletBadge" class="hidden items-center gap-2 bg-amber-500/10 border border-amber-500/20 rounded-full px-3 py-1">
                        <i class="fas fa-wallet text-accent text-xs"></i>
                        <span id="walletAmount" class="text-accent font-bold text-xs"></span>
                    </div>
                    <div class="relative">
                        <button onclick="toggleNotifDropdown()" class="text-muted hover:text-fg transition p-1.5 relative">
                            <i class="fas fa-bell text-sm"></i>
                            <span id="notifCount" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-danger rounded-full text-[9px] text-white font-bold flex items-center justify-center hidden">0</span>
                        </button>
                        <div id="notifDropdown" class="notif-dropdown mt-2"></div>
                    </div>
                    <button onclick="handleLogout()" class="btn btn-ghost text-[11px] py-1 px-2.5">
                        <i class="fas fa-sign-out-alt"></i>
                        <span class="hidden sm:inline">Logout</span>
                    </button>
                </div>
            </header>
            <main id="contentArea" class="p-5"></main>
        </div>
    </div>

    <!-- Modals & Toasts -->
    <div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal-box" id="modalBox"></div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <!-- Core Logic -->
    <script src="script.js"></script>
</body>
</html>
